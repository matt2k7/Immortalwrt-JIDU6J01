name: Build Jio JIDU6J01 (ImmortalWrt) and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  schedule:
    - cron: '30 18 * * *' # Midnight IST (18:30 UTC)
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'openwrt/openwrt PR number to port onto ImmortalWrt (adds device support not yet upstream there)'
        required: false
        default: '23510'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.inputs.pr_number || '23510' }}
      CACHE_KEY: immortalwrt-cache-week-$(date +%U)

    steps:
      - name: Checkout repository (only the workflow files)
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          sudo docker image prune -af || true
          echo "Disk after cleanup:"
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential flex bison gawk git \
            libncurses-dev zlib1g-dev unzip \
            python3 python3-setuptools python3-dev \
            libssl-dev libelf-dev libfdt-dev \
            file wget curl rsync subversion \
            ccache

      - name: Prepare ccache
        run: |
          ccache -M 5G
          ccache -s

      - name: Restore ImmortalWrt build cache
        uses: actions/cache@v4
        id: immortalwrt-cache
        with:
          path: immortalwrt
          key: ${{ env.CACHE_KEY }}-immortalwrt
          restore-keys: |
            ${{ env.CACHE_KEY }}-immortalwrt
            immortalwrt-cache-week-

      - name: Clone or update ImmortalWrt
        run: |
          if [ -d "immortalwrt/.git" ]; then
            echo "Using cached ImmortalWrt directory, cleaning up..."
            cd immortalwrt
            git reset --hard
            git clean -fdx
            # Fetch master and detach HEAD so we can drop the old patch branch
            git fetch origin master --depth=1
            git checkout FETCH_HEAD
            git branch -D "pr-${PR_NUMBER}" 2>/dev/null || true
          else
            echo "Cloning ImmortalWrt (depth 1)..."
            git clone --depth=1 --branch master https://github.com/immortalwrt/immortalwrt.git immortalwrt
            cd immortalwrt
          fi

          # Runner has no git identity by default; the local commit below needs one
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          echo "Fetching openwrt/openwrt PR #${PR_NUMBER} as a patch (this device isn't upstream in ImmortalWrt yet)..."
          curl -fsSL "https://github.com/openwrt/openwrt/pull/${PR_NUMBER}.diff" -o "/tmp/pr-${PR_NUMBER}.diff"

          git checkout -b "pr-${PR_NUMBER}"
          git apply --whitespace=fix --verbose "/tmp/pr-${PR_NUMBER}.diff"
          git add -A
          git commit -m "Apply openwrt/openwrt PR #${PR_NUMBER} on top of ImmortalWrt"
        working-directory: .

      - name: Set up ccache in ImmortalWrt
        run: |
          echo "CONFIG_CCACHE=y" >> immortalwrt/.config
          echo "CCACHE_DIR=$(realpath .ccache)" >> immortalwrt/.config
        working-directory: .

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ env.CACHE_KEY }}-ccache
          restore-keys: |
            ${{ env.CACHE_KEY }}-ccache
            immortalwrt-ccache-

      - name: Make build script executable
        run: chmod +x ./build_jidu6j01.sh
        working-directory: .

      - name: Run build
        run: ../build_jidu6j01.sh
        working-directory: immortalwrt

      - name: Check if output files exist
        id: check_files
        run: |
          FILES=(
            "./immortalwrt/bin/targets/mediatek/filogic/immortalwrt-mediatek-filogic-jiorouter_ax6000-jidu6j01-squashfs-sysupgrade.bin"
            "./immortalwrt/bin/targets/mediatek/filogic/immortalwrt-mediatek-filogic-jiorouter_ax6000-jidu6j01-initramfs-kernel.bin"
            "./immortalwrt/bin/targets/mediatek/filogic/config.buildinfo"
            "./immortalwrt/bin/targets/mediatek/filogic/version.buildinfo"
          )
          ALL_EXIST=true
          for FILE in "${FILES[@]}"; do
            if [ -f "$FILE" ]; then
              echo "$FILE exists"
            else
              echo "$FILE does not exist"
              ALL_EXIST=false
            fi
          done
          if [ "$ALL_EXIST" = "true" ]; then
            echo "All required files present"
            echo "files_exist=true" >> $GITHUB_OUTPUT
          else
            echo "One or more files missing"
            echo "files_exist=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Set release tag
        if: steps.check_files.outputs.files_exist == 'true'
        id: set_tag
        run: echo "TAG=v$(date +'%d-%m-%Y')" >> $GITHUB_OUTPUT

      - name: Create/Update Release
        if: steps.check_files.outputs.files_exist == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.set_tag.outputs.TAG }}
          name: "Build ${{ steps.set_tag.outputs.TAG }}"
          body: |
            Automated ImmortalWrt build with openwrt/openwrt PR #${{ env.PR_NUMBER }} applied for device support.
            Build date: ${{ steps.set_tag.outputs.TAG }}
          artifacts: |
            ./immortalwrt/bin/targets/mediatek/filogic/immortalwrt-mediatek-filogic-jiorouter_ax6000-jidu6j01-squashfs-sysupgrade.bin
            ./immortalwrt/bin/targets/mediatek/filogic/immortalwrt-mediatek-filogic-jiorouter_ax6000-jidu6j01-initramfs-kernel.bin
            ./immortalwrt/bin/targets/mediatek/filogic/config.buildinfo
            ./immortalwrt/bin/targets/mediatek/filogic/version.buildinfo
          draft: false
          prerelease: false
          allowUpdates: true
          removeArtifacts: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save ccache stats
        run: ccache -s
